name: CI/CD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Run logic tests
      run: npm run test:logic
    
    - name: Syntax check
      run: node -c src/index.js && node -c src/handlers/messageHandler.js
    
    - name: Check for lint issues
      run: |
        # Basic checks
        npm ls --depth=0 || true
    
  sync-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Test sync script syntax
      run: node -c scripts/sync-data.js